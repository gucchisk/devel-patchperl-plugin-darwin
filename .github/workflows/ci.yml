name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  test-patch:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: install with cpanminus
        uses: perl-actions/install-with-cpanm@v1.7
        with:
          install: |
            Module::Build
            Devel::PatchPerl
      - name: test patching
        run: |
          perl Build.PL
          ./Build test
  test-macos13:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: install with cpanminus
        uses: perl-actions/install-with-cpanm@v1.7
        with:
          install: |
            Module::Build
            Devel::PatchPerl
            .
      - name: cpanm info
        run: |
          whoami
          ls -al /Users/runner/.cpanm
          sudo chown -R runner /Users/runner/.cpanm
          echo $PATH
          ls /usr/local/Cellar/perl/5.38.2_1/bin
          perl --version
          /usr/local/Cellar/perl/5.38.2_1/bin/cpanm --version
      - name: perl 5.28.3
        run: |
          curl -L https://install.perlbrew.pl | bash
          source ~/perl5/perlbrew/etc/bashrc
          perlbrew install-patchperl
          export PERL5_PATCHPERL_PLUGIN=Darwin
          perlbrew install perl-5.28.3
